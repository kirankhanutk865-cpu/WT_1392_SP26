<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Selectors</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <h1>Basic Selectors</h1>
    <p>This paragraph is styled by element selector.</p>
    <p class="highlight">This paragraph has a class "highlight".</p>
    <p id="special">This paragraph has an ID "special".</p>
    <div>This div is also affected by universal selector (border).</div>
    <span>Span gets universal border and element font style?</span>
</body>
</html>
