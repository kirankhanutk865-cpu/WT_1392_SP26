<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Styling</title>
    <link rel="stylesheet" href="style8.css">
</head>
<body>
    <h1>Text Styling</h1>

    <p class="color-opacity">This text has color with opacity.</p>
    <p class="align-left">Left aligned text.</p>
    <p class="align-center">Center aligned text.</p>
    <p class="align-right">Right aligned text.</p>

    <p class="underline">Underlined text.</p>
    <p class="line-through">Line-through text.</p>
    <p class="overline">Overline text.</p>

    <p class="uppercase">uppercase transformation</p>
    <p class="lowercase">LOWERCASE TRANSFORMATION</p>
    <p class="capitalize">capitalize each word.</p>

    <p class="shadow">Text with shadow</p>
</body>
</html>
