<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pseudo-classes</title>
    <link rel="stylesheet" href="style5.css">
</head>
<body>
    <h1>Pseudo-classes</h1>

    <a href="https://example.com" class="link">Visit Example (unvisited)</a><br>
    <a href="https://example.com" class="link visited-example">Visited link (if in history)</a><br>

    <form>
        <label>Name: <input type="text" class="focus-input"></label><br>
        <label><input type="checkbox" class="check"> Check me</label><br>
        <button disabled>Disabled Button</button>
    </form>

    <ul>
        <li>First child</li>
        <li>Second child</li>
        <li>Third child</li>
        <li>Last child</li>
    </ul>

    <div class="empty-box"></div>
    <div class="not-example">This has content</div>
</body>
</html>
