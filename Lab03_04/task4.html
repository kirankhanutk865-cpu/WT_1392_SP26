<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Styling Portfolio</title>
    <link rel="stylesheet" href="task4.css">
</head>
<body>
    <h1>Image Gallery</h1>

    <div class="gallery">
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="img1">
            <p>Rounded corners</p>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="img2" class="circle">
            <p>Circular image</p>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="img3" class="border-shadow">
            <p>Border and shadow</p>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="img4" class="hover-effect">
            <p>Hover effect</p>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="img5" class="filter">
            <p>Filter applied</p>
        </div>
        <div class="card overlay-card">
            <img src="https://via.placeholder.com/300x200" alt="img6">
            <div class="overlay">Text Overlay</div>
        </div>
    </div>
</body>
</html>
