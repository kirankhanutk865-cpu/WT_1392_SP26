<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Component</title>
    <link rel="stylesheet" href="task7.css">
</head>
<body>
    <h1>Product Cards</h1>

    <div class="cards-container">
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="Product 1">
            <div class="card-content">
                <h3>Product Name 1</h3>
                <p>Description of product. This is a great item.</p>
                <p class="price">$19.99</p>
                <button class="btn">Buy Now</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="Product 2">
            <div class="card-content">
                <h3>Product Name 2</h3>
                <p>Another awesome product with amazing features.</p>
                <p class="price">$29.99</p>
                <button class="btn">Buy Now</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="Product 3">
            <div class="card-content">
                <h3>Product Name 3</h3>
                <p>High quality and durable. Satisfaction guaranteed.</p>
                <p class="price">$39.99</p>
                <button class="btn">Buy Now</button>
            </div>
        </div>
    </div>
</body>
</html>
