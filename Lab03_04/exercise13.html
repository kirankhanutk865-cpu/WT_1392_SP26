<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Image Effects</title>
    <link rel="stylesheet" href="style13.css">
</head>
<body>
    <h1>Advanced Image Effects</h1>

    <div class="hover-effect">
        <img src="https://via.placeholder.com/300x200" alt="hover">
        <p>Hover over image</p>
    </div>

    <img src="https://via.placeholder.com/300x200" alt="filters" class="filter-effects">

    <div class="blend-mode-image">
        <img src="https://via.placeholder.com/300x200" alt="blend">
    </div>

    <div class="mask">
        <img src="https://via.placeholder.com/300x200" alt="mask">
    </div>
</body>
</html>
