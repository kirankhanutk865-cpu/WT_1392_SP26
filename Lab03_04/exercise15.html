<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transforms & Transitions</title>
    <link rel="stylesheet" href="style15.css">
</head>
<body>
    <h1>Transforms and Transitions</h1>

    <div class="transform translate">Translate</div>
    <div class="transform rotate">Rotate</div>
    <div class="transform scale">Scale</div>
    <div class="transform skew">Skew</div>

    <div class="transition">Hover for transition</div>

    <div class="transform-origin">Transform origin</div>
</body>
</html>
