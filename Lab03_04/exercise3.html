<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attribute Selectors</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <h1>Attribute Selectors</h1>

    <a href="https://example.com" target="_blank">Example link (target="_blank")</a><br>
    <a href="http://google.com">Google (http)</a><br>
    <a href="https://secure.com" target="_self">Secure (https, target="_self")</a><br>

    <img src="image.jpg" alt="Sample image" title="My Image">
    <img src="photo.png" alt="Photo">
    <img src="icon.svg" alt="Icon" title="Icon">

    <input type="text" placeholder="Text input">
    <input type="password" placeholder="Password">
    <input type="submit" value="Submit">
</body>
</html>
