<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Button Styling</title>
    <link rel="stylesheet" href="task5.css">
</head>
<body>
    <h1>Button Collection</h1>

    <button class="btn small">Small</button>
    <button class="btn medium">Medium</button>
    <button class="btn large">Large</button>
    <button class="btn primary">Primary</button>
    <button class="btn secondary">Secondary</button>
    <button class="btn success">Success</button>
    <button class="btn danger">Danger</button>
    <button class="btn rounded">Rounded</button>
    <button class="btn pill">Pill</button>
    <button class="btn shadow">Shadow</button>
    <button class="btn gradient">Gradient</button>
    <button class="btn hover-grow">Hover Grow</button>
    <button class="btn hover-rotate">Hover Rotate</button>
    <button class="btn:focus">Focus me</button>
    <button class="btn" disabled>Disabled</button>
</body>
</html>
