<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Layout</title>
    <link rel="stylesheet" href="task13-portfolio.css">
</head>
<body>
    <div class="portfolio">
        <header class="portfolio-header">
            <h1>My Portfolio</h1>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Work</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </header>
        <section class="hero">
            <div class="hero-text">Welcome to my site</div>
            <div class="decorative-box"></div>
        </section>
        <section class="gallery">
            <h2>Projects</h2>
            <div class="project-grid">
                <div class="project">Project 1</div>
                <div class="project">Project 2</div>
                <div class="project">Project 3</div>
                <div class="project">Project 4</div>
            </div>
        </section>
        <footer class="portfolio-footer">Footer</footer>
    </div>
</body>
</html>
