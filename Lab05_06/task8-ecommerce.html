<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-commerce Product Grid</title>
    <link rel="stylesheet" href="task8-ecommerce.css">
</head>
<body>
    <div class="page">
        <aside class="filter-sidebar" id="filterSidebar">
            <h3>Filters</h3>
            <ul>
                <li>Category 1</li>
                <li>Category 2</li>
                <li>Category 3</li>
            </ul>
            <button class="close-filter">×</button>
        </aside>
        <main class="products">
            <button class="filter-toggle">☰ Filters</button>
            <div class="product-grid">
                <div class="product-card">Product 1</div>
                <div class="product-card">Product 2</div>
                <div class="product-card">Product 3</div>
                <div class="product-card">Product 4</div>
                <div class="product-card">Product 5</div>
                <div class="product-card">Product 6</div>
                <div class="product-card">Product 7</div>
                <div class="product-card">Product 8</div>
            </div>
        </main>
    </div>
    <script>
        document.querySelector('.filter-toggle').onclick = function() {
            document.getElementById('filterSidebar').classList.add('open');
        };
        document.querySelector('.close-filter').onclick = function() {
            document.getElementById('filterSidebar').classList.remove('open');
        };
    </script>
</body>
</html>
