<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flexbox Cards</title>
    <link rel="stylesheet" href="task5-flex-cards.css">
</head>
<body>
    <h1>Responsive Card Layout</h1>
    <div class="card-container">
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="card img">
            <h3>Card Title 1</h3>
            <p>Short content.</p>
            <button>Read More</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="card img">
            <h3>Card Title 2</h3>
            <p>Longer content that might wrap. Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            <button>Read More</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="card img">
            <h3>Card Title 3</h3>
            <p>Medium content.</p>
            <button>Read More</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="card img">
            <h3>Card Title 4</h3>
            <p>Another card with some description.</p>
            <button>Read More</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="card img">
            <h3>Card Title 5</h3>
            <p>Short.</p>
            <button>Read More</button>
        </div>
    </div>
</body>
</html>
