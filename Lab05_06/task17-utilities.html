<!DOCTYPE html>
<html lang="en">
<head>

    <title>Responsive Utilities</title>
    <link rel="stylesheet" href="task17-utilities.css">
</head>
<body>
    <h1>Responsive Utility Classes</h1>
    <div class="show-mobile">Visible only on mobile</div>

    <div class="show-desktop">Visible only on desktop</div>

    <div class="mt-1">Margin top 1rem</div>

    <div class="text-center">Centered text</div>
    <div class="text-left-mobile text-center-tablet">Changes alignment</div>

    <div class="flex-col-mobile flex-row-tablet">
        <div>Item 1</div>
        <div>Item 2</div>
    </div>
