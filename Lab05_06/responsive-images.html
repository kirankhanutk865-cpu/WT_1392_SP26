<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive Images</title>
    <link rel="stylesheet" href="responsive-images.css">
</head>
<body>
    <h1>Responsive Images</h1>

    <h2>srcset and sizes</h2>
    <img src="https://via.placeholder.com/400x300"
         srcset="https://via.placeholder.com/200x150 200w,
                 https://via.placeholder.com/400x300 400w,
                 https://via.placeholder.com/800x600 800w"
         sizes="(max-width: 600px) 100vw, (max-width: 1000px) 50vw, 800px"
         alt="placeholder">

    <h2>Picture element for art direction</h2>
    <picture>
        <source media="(max-width: 600px)" srcset="https://via.placeholder.com/300x200">
        <source media="(max-width: 1000px)" srcset="https://via.placeholder.com/600x400">
        <img src="https://via.placeholder.com/1200x800" alt="placeholder">
    </picture>

    <h2>Responsive background image</h2>
    <div class="bg-image"></div>
</body>
</html>
