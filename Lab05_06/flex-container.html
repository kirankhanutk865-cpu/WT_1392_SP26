<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flex Container</title>
    <link rel="stylesheet" href="flex-container.css">
</head>
<body>
    <h1>Flex Container Properties</h1>

    <h2>flex-direction: row (default)</h2>
    <div class="flex-container row">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

    <h2>flex-direction: column</h2>
    <div class="flex-container column">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

    <h2>flex-wrap: wrap</h2>
    <div class="flex-container wrap">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
    </div>

    <h2>justify-content: space-between</h2>
    <div class="flex-container space-between">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

    <h2>align-items: center</h2>
    <div class="flex-container align-center" style="height: 150px;">
        <div class="item">1</div>
        <div class="item tall">2 (tall)</div>
        <div class="item">3</div>
    </div>

    <h2>align-content: space-around (multi-line)</h2>
    <div class="flex-container align-content" style="height: 300px; flex-wrap: wrap;">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
    </div>
</body>
</html>
