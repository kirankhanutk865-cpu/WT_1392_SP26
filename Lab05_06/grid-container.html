<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid Container</title>
    <link rel="stylesheet" href="grid-container.css">
</head>
<body>
    <h1>Grid Container Properties</h1>

    <h2>grid-template-columns & rows</h2>
    <div class="grid basic">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>

    <h2>grid-template-areas</h2>
    <div class="grid areas">
        <header>Header</header>
        <nav>Nav</nav>
        <main>Main</main>
        <aside>Aside</aside>
        <footer>Footer</footer>
    </div>

    <h2>gap (gutter)</h2>
    <div class="grid gap">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>

    <h2>justify-items & align-items</h2>
    <div class="grid align">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>
</body>
</html>
