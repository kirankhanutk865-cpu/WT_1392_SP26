<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Position Values</title>
    <link rel="stylesheet" href="position-values.css">
</head>
<body>
    <h1>CSS Positioning</h1>

    <div class="static">Static (default)</div>

    <div class="relative">Relative (offset from normal)</div>

    <div class="relative-container">
        <div class="absolute">Absolute (relative to container)</div>
    </div>

    <div class="fixed">Fixed (stays in viewport)</div>

    <div class="sticky-container">
        <div class="sticky">Sticky (sticks when scrolling)</div>
        <p>Scroll down to see sticky in action.</p>
        <p style="height: 800px;">Lots of content to scroll.</p>
    </div>
</body>
</html>
