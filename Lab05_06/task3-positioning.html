<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Positioning Challenge</title>
    <link rel="stylesheet" href="task3-positioning.css">
</head>
<body>
    <header class="site-header">Fixed Header (becomes static on mobile)</header>

    <div class="content">
        <div class="sticky-sidebar">Sticky Sidebar</div>
        <main class="main-area">
            <h1>Main Content</h1>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. ...</p>
            <p style="height: 600px;">Scroll for sticky effect</p>

            <div class="z-index-demo">
                <div class="box box1">Box 1 (z:1)</div>
                <div class="box box2">Box 2 (z:2)</div>
                <div class="box box3">Box 3 (z:3)</div>
            </div>

            <button id="openModal">Open Modal</button>
        </main>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p>This modal becomes full-screen on mobile.</p>
        </div>
    </div>

    <script>
        document.getElementById('openModal').onclick = function() {
            document.getElementById('modal').style.display = 'block';
        }
        document.querySelector('.close').onclick = function() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
