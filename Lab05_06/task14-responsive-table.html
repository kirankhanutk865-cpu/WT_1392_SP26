<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive Data Table</title>
    <link rel="stylesheet" href="task14-responsive-table.css">
</head>
<body>
    <h1>Responsive Table</h1>
    <table class="responsive-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John Doe</td>
                <td>28</td>
                <td>john@example.com</td>
                <td>New York</td>
            </tr>
            <tr>
                <td>Jane Smith</td>
                <td>34</td>
                <td>jane@example.com</td>
                <td>Los Angeles</td>
            </tr>
            <tr>
                <td>Bob Johnson</td>
                <td>45</td>
                <td>bob@example.com</td>
                <td>Chicago</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
