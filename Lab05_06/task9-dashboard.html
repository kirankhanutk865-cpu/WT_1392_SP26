<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Layout</title>
    <link rel="stylesheet" href="task9-dashboard.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <h2>Dashboard</h2>
            <ul>
                <li>Home</li>
                <li>Analytics</li>
                <li>Settings</li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="dashboard-header">
                <h1>Welcome back, User</h1>
                <div class="user-menu">👤</div>
            </header>
            <div class="stat-cards">
                <div class="stat-card">Sales</div>
                <div class="stat-card">Revenue</div>
                <div class="stat-card">Users</div>
            </div>
            <div class="chart-area">
                <div class="chart">Chart Placeholder</div>
                <div class="recent-activity">Recent Activity</div>
            </div>
        </main>
    </div>
</body>
</html>
